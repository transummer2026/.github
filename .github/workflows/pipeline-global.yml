name: Pipeline Global

on:
  pull_request:
    branches: [dev, main, staging]
  push:
    branches: [dev]
  repository_dispatch:
    types: [build-result, all-builds-success]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  # Déclenchement -> push sur dev
  trigger:
    name: Trigger
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - run: echo "Pipeline global déclenché par ${{ github.actor }}"

  # Dispatch -> microservices
  dispatch:
    name: Dispatch vers les repos
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: trigger
    steps:
      - name: Trigger gateway
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/gateway
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger ai
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/ai
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger front
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/front
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger api
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/api
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/infra
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger cyber
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/cyber
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger docs
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/docs
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Notify Discord — pipeline lancé
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GLOBAL }}
          status: success
          title: "Pipeline dev lancé — ${{ github.actor }}"
          description: "Dispatch envoyé vers tous les repos — sha ${{ github.sha }}"

  # Déclenchement -> build-result
  collect:
    name: Collecter résultats
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'repository_dispatch' && github.event.action == 'build-result'
    steps:
      - name: Restaurer cache résultats
        uses: actions/cache@v4
        with:
          path: build-results
          key: build-results-${{ github.event.client_payload.sha }}
          restore-keys: build-results-${{ github.event.client_payload.sha }}

      - name: Écrire résultat du service
        run: |
          mkdir -p build-results
          echo '${{ toJson(github.event.client_payload) }}' \
            > build-results/${{ github.event.client_payload.service }}.json
          echo "Résultat reçu : ${{ github.event.client_payload.service }} — ${{ github.event.client_payload.status }}"

      - name: Vérifier si tous les builds sont reçus
        id: check
        run: |
          SERVICES=(gateway ai front api infra cyber docs)
          ALL_DONE=true
          ALL_SUCCESS=true
          FAILED_SERVICES=""

          for svc in "${SERVICES[@]}"; do
            if [ ! -f "build-results/${svc}.json" ]; then
              echo "En attente : ${svc}"
              ALL_DONE=false
            else
              STATUS=$(jq -r '.status' "build-results/${svc}.json")
              if [ "$STATUS" != "success" ]; then
                ALL_SUCCESS=false
                FAILED_SERVICES="${FAILED_SERVICES} ${svc}"
                echo "Fail : ${svc}"
              else
                echo "OK : ${svc}"
              fi
            fi
          done

          echo "all_done=${ALL_DONE}" >> $GITHUB_OUTPUT
          echo "all_success=${ALL_SUCCESS}" >> $GITHUB_OUTPUT
          echo "failed_services=${FAILED_SERVICES}" >> $GITHUB_OUTPUT

      - name: Trigger intégration — tous OK
        if: steps.check.outputs.all_done == 'true' && steps.check.outputs.all_success == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/.github
          event-type: all-builds-success
          client-payload: '{"sha": "${{ github.event.client_payload.sha }}"}'

      - name: Notify Discord — pipeline bloqué
        if: steps.check.outputs.all_done == 'true' && steps.check.outputs.all_success == 'false'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GLOBAL }}
          status: failure
          title: "Pipeline bloqué"
          description: "Services en échec :${{ steps.check.outputs.failed_services }}"
          color: 0xFF0000

        
  # Intégration, tests, SBOM
  integration:
    name: Container scan · Intégration · SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'repository_dispatch' && github.event.action == 'all-builds-success'
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull images :sha
        run: |
          SHA=${{ github.event.client_payload.sha }}
          for svc in gateway ai front api; do
            docker pull ghcr.io/${{ github.repository_owner }}/${svc}:sha-${SHA}
          done

      - name: Container scanning — Trivy
        run: |
          SHA=${{ github.event.client_payload.sha }}
          FAILED=false
          for svc in gateway ai front api; do
            echo "Scanning ${svc}..."
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy image \
              --exit-code 1 \
              --severity CRITICAL \
              --no-progress \
              ghcr.io/${{ github.repository_owner }}/${svc}:sha-${SHA} || FAILED=true
          done
          if [ "$FAILED" = "true" ]; then
            echo "Container scanning failed"
            exit 1
          fi

      - name: Tests d'intégration
        run: |
          # TODO — à implémenter quand l'environnement de test sera prêt
          echo "Tests d'intégration — placeholder"

      - name: Générer SBOM — gateway
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/gateway:sha-${{ github.event.client_payload.sha }}
          artifact-name: sbom-gateway-${{ github.event.client_payload.sha }}.spdx.json
          output-file: sbom-gateway.spdx.json

      - name: Générer SBOM — ai
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/ai:sha-${{ github.event.client_payload.sha }}
          artifact-name: sbom-ai-${{ github.event.client_payload.sha }}.spdx.json
          output-file: sbom-ai.spdx.json

      - name: Générer SBOM — front
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/front:sha-${{ github.event.client_payload.sha }}
          artifact-name: sbom-front-${{ github.event.client_payload.sha }}.spdx.json
          output-file: sbom-front.spdx.json

      - name: Générer SBOM — api
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/api:sha-${{ github.event.client_payload.sha }}
          artifact-name: sbom-api-${{ github.event.client_payload.sha }}.spdx.json
          output-file: sbom-api.spdx.json

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Attendre connexion Tailscale
        run: |
          timeout 30 bash -c 'until tailscale status --peers=false | grep -q "100\."; do sleep 1; done'
          echo "Tailscale connecté — IP: $(tailscale ip -4)"

      - name: Envoyer trace OTel — pipeline global
        run: |
          TRACE_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 32)
          SPAN_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 16)
          END_NS=$(date +%s%N)
          START_NS=$(( END_NS - 1000000000 ))

          curl -sf -X POST "${{ secrets.OTEL_ENDPOINT }}/v1/traces" \
            -H "Content-Type: application/json" \
            -d "{
              \"resourceSpans\": [{
                \"resource\": {
                  \"attributes\": [
                    {\"key\": \"service.name\", \"value\": {\"stringValue\": \"pipeline-global\"}},
                    {\"key\": \"deployment.environment\", \"value\": {\"stringValue\": \"ci\"}},
                    {\"key\": \"ci.provider\", \"value\": {\"stringValue\": \"github-actions\"}}
                  ]
                },
                \"scopeSpans\": [{
                  \"spans\": [{
                    \"traceId\": \"${TRACE_ID}\",
                    \"spanId\": \"${SPAN_ID}\",
                    \"name\": \"pipeline/integration\",
                    \"startTimeUnixNano\": \"${START_NS}\",
                    \"endTimeUnixNano\": \"${END_NS}\",
                    \"status\": {\"code\": 1},
                    \"attributes\": [
                      {\"key\": \"ci.sha\", \"value\": {\"stringValue\": \"${{ github.event.client_payload.sha }}\"}},
                      {\"key\": \"ci.actor\", \"value\": {\"stringValue\": \"${{ github.actor }}\"}},
                      {\"key\": \"ci.run_id\", \"value\": {\"stringValue\": \"${{ github.run_id }}\"}}
                    ]
                  }]
                }]
              }]
            }"

      - name: Sync pollpear submodules
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/pollpear
          event-type: sync-submodules
          client-payload: |
            {
              "sha": "${{ github.event.client_payload.sha }}"
            }

      - name: Notify Discord — pipeline réussi
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GLOBAL }}
          status: success
          title: "Pipeline dev réussi"
          description: "Container scan, intégration, SBOM OK — sha ${{ github.event.client_payload.sha }}"

      - name: Notify Discord — intégration échouée
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GLOBAL }}
          status: failure
          title: "Echec intégration"
          description: "Voir les logs GitHub Actions."
          color: 0xFF0000