name: CI Service Push (dev)

# Chemin "ship" : invoqué par le caller de chaque service sur push dev
# (après merge de PR, dev protégée). Pas de re-validation ici — checks /
# quality / tests ont déjà tourné sur la PR. On construit l'image finale,
# on release, on dispatch vers le super-repo et on met à jour le submodule.
on:
  workflow_call:
    inputs:
      service_name:
        description: "Nom du service (ex: gateway, api, front)"
        required: true
        type: string
      skip_build:
        description: "Passer le build/push GHCR (ex: repo sans Dockerfile)"
        required: false
        type: boolean
        default: false
    secrets:
      OTEL_ENDPOINT:
        required: true
      TAILSCALE_AUTHKEY:
        required: true
      DISCORD_WEBHOOK_REPO:
        required: true
      GHCR_TOKEN:
        required: true
      APP_CLIENT_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      SEMANTIC_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  # job 1 - BUILD (image finale poussée depuis le commit dev mergé)
  build:
    name: Build · Push GHCR
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_build }}
    permissions:
      contents: read
      packages: write
    timeout-minutes: 25
    outputs:
      duration_ms: ${{ steps.timer.outputs.ms }}
    steps:
      - name: Générer le token App
        id: app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v7
        with:
          submodules: recursive
          token: ${{ steps.app.outputs.token }}

      - name: Record start time
        id: timer_start
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build & Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute duration
        id: timer
        if: always()
        run: |
          END=$(date +%s%3N)
          echo "ms=$(( END - ${{ steps.timer_start.outputs.start }} ))" >> $GITHUB_OUTPUT

  # job 2 - RELEASE (semantic-release, pas de PR)
  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.skip_build && needs.build.result == 'success' }}
    timeout-minutes: 10
    steps:
      - name: Générer le token App
        id: app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Get CI configs
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ steps.app.outputs.token }}
          path: .ci

      - name: Copy semantic-release config
        run: cp .ci/.github/.releaserc.json .releaserc.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_TOKEN }}
        run: npx --yes semantic-release

  # job 3 - OBSERVE (OTel · Discord · Dispatch super-repo · Submodule update)
  observe:
    name: OTel · Discord · Dispatch
    runs-on: ubuntu-latest
    needs: [build, release]
    if: always()
    timeout-minutes: 10
    steps:
      - name: Générer le token App
        id: app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Get CI scripts
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ steps.app.outputs.token }}
          path: .ci

      - name: Déterminer statut global
        id: status
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          QUALITY_RESULT: success
          SKIP_BUILD: ${{ inputs.skip_build }}
        run: bash .ci/.github/scripts/global_status.sh

      - name: Envoyer trace OTel
        env:
          OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
          SERVICE: ${{ inputs.service_name }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          DURATION_MS: ${{ needs.build.outputs.duration_ms || '0' }}
          STATUS_CODE: ${{ steps.status.outputs.status_code }}
          STATUS_RESULT: ${{ steps.status.outputs.result }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          TEST_COUNT: "0"
          COVERAGE: "0"
        run: bash .ci/.github/scripts/send_otel_trace.sh

      - name: Notify Discord - succès
        if: steps.status.outputs.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: success
          title: "✅ Build réussi - ${{ inputs.service_name }}"
          description: "Image poussée - sha-${{ github.sha }}"

      - name: Notify Discord - échec
        if: steps.status.outputs.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: failure
          title: "❌ Build échoué - ${{ inputs.service_name }}"
          description: "@${{ github.actor }} - voir les logs"
          color: 0xFF0000

      - name: Dispatch retour vers pipeline global
        if: steps.status.outputs.result == 'success'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app.outputs.token }}
          repository: ${{ github.repository_owner }}/.github
          event-type: build-result
          client-payload: |
            {
              "service": "${{ inputs.service_name }}",
              "status": "${{ steps.status.outputs.result }}",
              "sha": "${{ github.sha }}",
              "run_id": "${{ github.run_id }}",
              "image": "ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:sha-${{ github.sha }}"
            }

      - name: Résoudre la PR source
        id: src_pr
        if: steps.status.outputs.result == 'success'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: bash .ci/.github/scripts/resolve_pr.sh

      - name: Notifier Pollpear (update submodule)
        if: steps.status.outputs.result == 'success'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app.outputs.token }}
          repository: ${{ github.repository_owner }}/Pollpear
          event-type: submodule-update
          client-payload: |
            {
              "service": "${{ inputs.service_name }}",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "commit_message": ${{ toJSON(github.event.head_commit.message) }},
              "commit_url": "${{ github.event.head_commit.url }}",
              "ci_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "pr": {
                "number": "${{ steps.src_pr.outputs.number }}",
                "title": ${{ toJSON(steps.src_pr.outputs.title) }},
                "url": "${{ steps.src_pr.outputs.url }}"
              }
            }
