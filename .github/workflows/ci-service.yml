name: CI Service (Réutilisable)

# CI3 — validation complète sur PR vers dev : titre PR, commitlint,
# secret scan, audit deps, lint, SAST, tests, coverage, build de
# validation du Dockerfile (sans push : personne ne consomme les images
# de services à ce jour), observabilité, merge-gate. Sur push dev, tous
# les jobs sont skippés — la validation a déjà tourné sur la PR. Le
# chemin "ship" (build+push final, release, submodules) est dans
# ci-services-push.yml, à câbler le jour où le déploiement tirera
# les images depuis GHCR.

on:
  workflow_call:
    inputs:
      service_name:
        description: "Nom du service (ex: gateway, api, front)"
        required: true
        type: string
      lint_cmd:
        description: "Commande de lint"
        required: true
        type: string
      test_cmd:
        description: "Commande de test"
        required: true
        type: string
      build_cmd:
        description: "Commande de build"
        required: true
        type: string
      install_cmd:
        description: "Commande d'installation des deps (vide pour rust)"
        required: false
        type: string
        default: ""
      coverage_threshold:
        description: "Seuil de couverture minimal (%)"
        required: false
        type: number
        default: 80
      audit_cmd:
        description: "Commande dependency audit"
        required: false
        type: string
        default: ""
      coverage_cmd:
        description: "Commande qui génère le coverage"
        required: false
        type: string
        default: ""
      coverage_format:
        description: "Format du coverage : cobertura | lcov | tarpaulin"
        required: false
        type: string
        default: "lcov"
      skip_build:
        description: "Passer le job build/push GHCR (ex: repo sans Dockerfile)"
        required: false
        type: boolean
        default: false
    secrets:
      OTEL_ENDPOINT:
        required: true
      TAILSCALE_AUTHKEY:
        required: true
      DISCORD_WEBHOOK_REPO:
        required: true
      GHCR_TOKEN:
        required: true
      APP_CLIENT_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      SEMANTIC_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  checks:
    name: Commit lint · Secret scan · Audit
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 10
    outputs:
      audit_severity: ${{ steps.audit.outputs.severity }}
    steps:
      - name: Générer le token App
        id: app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get CI scripts
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ steps.app.outputs.token }}
          path: .ci

      - name: Normaliser le titre de PR depuis le nom de branche
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
        run: bash .ci/.github/scripts/normalize_pr_title.sh

      - name: Commit lint
        id: commitlint
        continue-on-error: true
        uses: wagoid/commitlint-github-action@v6
        with:
          token: ${{ steps.app.outputs.token }}

      - name: Secret scanning
        id: secret_scan
        continue-on-error: true
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Install cargo-audit
        if: contains(inputs.audit_cmd, 'cargo audit') && hashFiles('Cargo.toml') != ''
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Skippé si le repo n'a pas encore de manifeste de deps à auditer.
      - name: Dependency audit
        id: audit
        if: hashFiles('Cargo.toml', 'package.json', 'pyproject.toml', 'requirements.txt') != ''
        env:
          AUDIT_CMD: ${{ inputs.audit_cmd }}
        run: bash .ci/.github/scripts/audit_severity.sh

      # Choix d'équipe : les CVE ne bloquent jamais en dev, on notifie seulement.
      - name: Notify Discord - CVE critique
        if: steps.audit.outputs.severity == 'critical'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: failure
          title: "CVE critique - ${{ inputs.service_name }}"
          description: "@${{ github.actor }} CVE critique détectée (non bloquant en dev)."
          color: 0xFF0000

      - name: Notify Discord - CVE haute (warning fort)
        if: steps.audit.outputs.severity == 'high'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          title: "⚠️ CVE haute - ${{ inputs.service_name }}"
          description: "@${{ github.actor }} CVE high détectée. À monitorer (non bloquant)."
          color: 0xFF4500

      - name: Notify Discord - CVE mineure
        if: steps.audit.outputs.severity == 'low'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: warning
          title: "CVE mineure - ${{ inputs.service_name }}"
          description: "CVE medium/low détectée (info). Aucun blocage."
          color: 0xFFA500

      - name: Bilan des checks
        env:
          OUTCOMES: |
            commitlint=${{ steps.commitlint.outcome }}
            secret-scan=${{ steps.secret_scan.outcome }}
        run: bash .ci/.github/scripts/check_step_outcomes.sh

  # job 2 - QUALITY
  quality:
    name: Lint · SAST · Tests · Coverage
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name != 'push'
    timeout-minutes: 25
    outputs:
      test_count: ${{ steps.tests.outputs.test_count }}
      coverage: ${{ steps.coverage.outputs.coverage }}
    steps:
      - name: Générer le token App
        id: app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v7
        with:
          submodules: recursive
          token: ${{ steps.app.outputs.token }}

      - name: Get CI scripts
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ steps.app.outputs.token }}
          path: .ci

      - name: Record start time
        id: timer_start
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Language detector
        id: lang
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
        run: bash .ci/.github/scripts/detect_language.sh

      # cache: '' désactive le cache quand le repo n'a pas encore de lockfile
      # ou de fichier de deps (setup-* échoue sinon sur un repo squelette).
      - name: Setup Node
        if: ${{ steps.lang.outputs.language == 'node' }}
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: ${{ hashFiles('**/package-lock.json') != '' && 'npm' || '' }}
      - name: Setup Python
        if: ${{ steps.lang.outputs.language == 'python' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: ${{ hashFiles('**/requirements.txt', '**/pyproject.toml') != '' && 'pip' || '' }}
      - name: Setup Rust
        if: ${{ steps.lang.outputs.language == 'rust' && steps.lang.outputs.has_project == 'true' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache Rust
        if: ${{ steps.lang.outputs.language == 'rust' && steps.lang.outputs.has_project == 'true' }}
        uses: Swatinem/rust-cache@v2
      - name: Install deps
        if: inputs.install_cmd != '' && steps.lang.outputs.has_project == 'true'
        run: ${{ inputs.install_cmd }}
      
      - name: Prisma generator
        if: ${{ steps.lang.outputs.language == 'node' && inputs.service_name == 'backend' && steps.lang.outputs.has_project == 'true' }}
        run: npx prisma generate

      # Repo squelette (has_project=false) : lint/tests/coverage skippés,
      # ils échoueraient sur un repo sans code.
      - name: Lint
        id: lint
        if: steps.lang.outputs.has_project == 'true'
        continue-on-error: true
        run: ${{ inputs.lint_cmd }}

      - name: Lint Dockerfile (hadolint)
        id: hadolint
        if: hashFiles('Dockerfile') != ''
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Cache Semgrep
        id: semgrep_cache
        uses: actions/cache@v4
        with:
          path: ~/.semgrep-venv
          key: semgrep-${{ runner.os }}-v1

      - name: Install Semgrep
        if: steps.semgrep_cache.outputs.cache-hit != 'true'
        run: python3 -m venv ~/.semgrep-venv && ~/.semgrep-venv/bin/pip install semgrep

      - name: SAST - Semgrep
        id: semgrep
        continue-on-error: true
        run: ~/.semgrep-venv/bin/semgrep scan --config auto --error

      - name: Bilan des linters
        env:
          OUTCOMES: |
            lint=${{ steps.lint.outcome }}
            hadolint=${{ steps.hadolint.outcome }}
            semgrep=${{ steps.semgrep.outcome }}
        run: bash .ci/.github/scripts/check_step_outcomes.sh

      - name: Tests unitaires
        if: steps.lang.outputs.has_project == 'true'
        run: |
          set -o pipefail
          ${{ inputs.test_cmd }} 2>&1 | tee test-output.log

      - name: Parse test count
        id: tests
        if: steps.lang.outputs.has_project == 'true'
        run: bash .ci/.github/scripts/parse_test_count.sh

      - name: Install cargo-tarpaulin
        if: contains(inputs.coverage_cmd, 'tarpaulin') && steps.lang.outputs.has_project == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Run coverage
        if: inputs.coverage_cmd != '' && steps.lang.outputs.has_project == 'true'
        run: ${{ inputs.coverage_cmd }}

      - name: Parse coverage
        id: coverage
        if: inputs.coverage_cmd != '' && steps.lang.outputs.has_project == 'true'
        env:
          COVERAGE_FORMAT: ${{ inputs.coverage_format }}
        run: bash .ci/.github/scripts/parse_coverage.sh

      - name: Coverage threshold
        if: inputs.coverage_cmd != '' && steps.lang.outputs.has_project == 'true'
        env:
          COVERAGE: ${{ steps.coverage.outputs.coverage }}
          THRESHOLD: ${{ inputs.coverage_threshold }}
        run: bash .ci/.github/scripts/check_coverage_threshold.sh

  # job 3 - BUILD
  build:
    name: Build Dockerfile
    runs-on: ubuntu-latest
    needs: [checks, quality]
    if: >-
      ${{ !cancelled() && !inputs.skip_build && github.event_name != 'push' &&
          contains(fromJSON('["success", "skipped"]'), needs.checks.result) &&
          contains(fromJSON('["success", "skipped"]'), needs.quality.result) }}
    timeout-minutes: 25
    outputs:
      duration_ms: ${{ steps.timer.outputs.ms }}
    steps:
      - name: Générer le token App
        id: app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v7
        with:
          submodules: recursive
          token: ${{ steps.app.outputs.token }}

      - name: Record start time
        id: timer_start
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (sans push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ inputs.service_name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute duration
        id: timer
        if: always()
        run: |
          END=$(date +%s%3N)
          echo "ms=$(( END - ${{ steps.timer_start.outputs.start }} ))" >> $GITHUB_OUTPUT

  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    needs: [checks, quality, build]
    if: ${{ always() && github.event_name != 'push' }}
    timeout-minutes: 10
    steps:
      - name: Générer le token App
        id: app
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Get CI scripts
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ steps.app.outputs.token }}
          path: .ci

      - name: Déterminer statut global
        id: status
        env:
          CHECKS_RESULT: ${{ needs.checks.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          SKIP_BUILD: ${{ inputs.skip_build }}
        run: bash .ci/.github/scripts/global_status.sh

      - name: Envoyer trace OTel
        env:
          OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
          SERVICE: ${{ inputs.service_name }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          DURATION_MS: ${{ needs.build.outputs.duration_ms || '0' }}
          STATUS_CODE: ${{ steps.status.outputs.status_code }}
          STATUS_RESULT: ${{ steps.status.outputs.result }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          TEST_COUNT: ${{ needs.quality.outputs.test_count || '0' }}
          COVERAGE: ${{ needs.quality.outputs.coverage || '0' }}
        run: bash .ci/.github/scripts/send_otel_trace.sh

      - name: Notify Discord - succès
        if: steps.status.outputs.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: success
          title: "✅ Validation réussie - ${{ inputs.service_name }}"
          description: "sha-${{ github.sha }}"

      - name: Notify Discord - échec
        if: steps.status.outputs.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: failure
          title: "❌ Validation échouée - ${{ inputs.service_name }}"
          description: "@${{ github.actor }} - voir les logs"
          color: 0xFF0000

      - name: Bloquer si un job requis a échoué
        if: steps.status.outputs.result != 'success'
        run: exit 1
