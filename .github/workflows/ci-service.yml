name: CI Service (Réutilisable)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      service_name:
        description: "Nom du service (ex: gateway, api, front)"
        required: true
        type: string
      lint_cmd:
        description: "Commande de lint"
        required: true
        type: string
      test_cmd:
        description: "Commande de test"
        required: true
        type: string
      build_cmd:
        description: "Commande de build"
        required: true
        type: string
      install_cmd:
        description: "Commande d'installation des deps (vide pour rust)"
        required: false
        type: string
        default: ""
      coverage_threshold:
        description: "Seuil de couverture minimal (%)"
        required: false
        type: number
        default: 80
      audit_cmd:
        description: "Commande dependency audit"
        required: false
        type: string
        default: ""
      coverage_cmd:
        description: "Commande qui génère le coverage"
        required: false
        type: string
        default: ""
      coverage_format:
        description: "Format du coverage : cobertura | lcov | tarpaulin"
        required: false
        type: string
        default: "lcov"
      skip_build:
        description: "Passer le job build/push GHCR (ex: repo sans Dockerfile)"
        required: false
        type: boolean
        default: false
    secrets:
      OTEL_ENDPOINT:
        required: true
      TAILSCALE_AUTHKEY:
        required: true
      DISCORD_WEBHOOK_REPO:
        required: true
      GHCR_TOKEN:
        required: true
      DISPATCH_TOKEN:
        required: true
      SEMANTIC_TOKEN:
        required: true

jobs:
  # job 1 - CHECKS
  checks:
    name: Commit lint · Secret scan · Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      audit_severity: ${{ steps.audit.outputs.severity }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Commit lint
        uses: wagoid/commitlint-github-action@v6
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Get CI scripts
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: .ci

      - name: Dependency audit
        id: audit
        env:
          AUDIT_CMD: ${{ inputs.audit_cmd }}
        run: bash .ci/.github/scripts/audit_severity.sh

      - name: Notify Discord - CVE critique
        if: steps.audit.outputs.severity == 'critical'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: failure
          title: "CVE critique - ${{ inputs.service_name }}"
          description: "@${{ github.actor }} doit corriger avant merge."
          color: 0xFF0000

      - name: Bloquer si CVE critique
        if: steps.audit.outputs.severity == 'critical'
        run: exit 0

      - name: Notify Discord - CVE mineure
        if: steps.audit.outputs.severity == 'low'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: warning
          title: "CVE mineure - ${{ inputs.service_name }}"
          description: "CVE medium/low détectée (info). Aucun blocage."
          color: 0xFFA500

  # job 2 - QUALITY
  quality:
    name: Lint · SAST · Tests · Coverage
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      test_count: ${{ steps.tests.outputs.test_count }}
      coverage: ${{ steps.coverage.outputs.coverage }}
    steps:
      - uses: actions/checkout@v7

      - name: Get CI scripts
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: .ci

      - name: Record start time
        id: timer_start
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Language detector
        id: lang
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
        run: bash .ci/.github/scripts/detect_language.sh

      - name: Setup Node
        if: ${{ steps.lang.outputs.language == 'node' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Setup Python
        if: ${{ steps.lang.outputs.language == 'python' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Setup Rust
        if: ${{ steps.lang.outputs.language == 'rust' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install deps
        if: inputs.install_cmd != ''
        run: ${{ inputs.install_cmd }}
      
      - name: Prisma generator
        if: ${{ steps.lang.outputs.language == 'node' }} && ${{ inputs.service_name == 'backend' }}
        run: npx prisma generate

      - name: Lint
        run: ${{ inputs.lint_cmd }}

      - name: SAST - Semgrep
        run: |
          pipx install semgrep
          semgrep scan --config auto --error

      - name: Tests unitaires
        run: |
          set -o pipefail
          ${{ inputs.test_cmd }} 2>&1 | tee test-output.log

      - name: Parse test count
        id: tests
        run: bash .ci/.github/scripts/parse_test_count.sh

      - name: Run coverage
        if: inputs.coverage_cmd != ''
        run: ${{ inputs.coverage_cmd }}

      - name: Parse coverage
        id: coverage
        if: inputs.coverage_cmd != ''
        env:
          COVERAGE_FORMAT: ${{ inputs.coverage_format }}
        run: bash .ci/.github/scripts/parse_coverage.sh

      - name: Coverage threshold
        if: inputs.coverage_cmd != ''
        env:
          COVERAGE: ${{ steps.coverage.outputs.coverage }}
          THRESHOLD: ${{ inputs.coverage_threshold }}
        run: bash .ci/.github/scripts/check_coverage_threshold.sh

  # job 3 - BUILD
  build:
    name: Build · Push GHCR
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ !inputs.skip_build }}
    outputs:
      duration_ms: ${{ steps.timer.outputs.ms }}
    steps:
      - uses: actions/checkout@v7

      - name: Record start time
        id: timer_start
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Compute duration
        id: timer
        if: always()
        run: |
          END=$(date +%s%3N)
          echo "ms=$(( END - ${{ steps.timer_start.outputs.start }} ))" >> $GITHUB_OUTPUT

  # job 4 - OBSERVE
  observe:
    name: OTel · Discord · Dispatch
    runs-on: ubuntu-latest
    needs: [checks, quality, build]
    if: always()
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Get CI scripts
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: .ci

      - name: Déterminer statut global
        id: status
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          SKIP_BUILD: ${{ inputs.skip_build }}
        run: bash .ci/.github/scripts/global_status.sh

      - name: Envoyer trace OTel
        env:
          OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
          SERVICE: ${{ inputs.service_name }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          DURATION_MS: ${{ needs.build.outputs.duration_ms || '0' }}
          STATUS_CODE: ${{ steps.status.outputs.status_code }}
          STATUS_RESULT: ${{ steps.status.outputs.result }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          TEST_COUNT: ${{ needs.quality.outputs.test_count || '0' }}
          COVERAGE: ${{ needs.quality.outputs.coverage || '0' }}
        run: bash .ci/.github/scripts/send_otel_trace.sh

      - name: Notify Discord - succès
        if: steps.status.outputs.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: success
          title: "✅ Build réussi - ${{ inputs.service_name }}"
          description: "Image poussée - sha-${{ github.sha }}"

      - name: Notify Discord - échec
        if: steps.status.outputs.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: failure
          title: "❌ Build échoué - ${{ inputs.service_name }}"
          description: "@${{ github.actor }} - voir les logs"
          color: 0xFF0000

      - name: Dispatch retour vers pipeline global
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/.github
          event-type: build-result
          client-payload: |
            {
              "service": "${{ inputs.service_name }}",
              "status": "${{ steps.status.outputs.result }}",
              "sha": "${{ github.sha }}",
              "run_id": "${{ github.run_id }}",
              "image": "ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}:sha-${{ github.sha }}"
            }

      - name: Notifier Pollpear (update submodule)
        if: steps.status.outputs.result == 'success' && github.ref_name == 'dev'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/Pollpear
          event-type: submodule-update
          client-payload: |
            {
              "service": "${{ inputs.service_name }}",
              "sha": "${{ github.sha }}"
            }

  # job 5 - RELEASE
  # on garde realise please sur le repo pollpear
  # et on use sementic-release ici car il ne fait pas de pr
  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.skip_build && (github.ref_name == 'dev' || github.ref_name == 'main') && needs.build.result == 'success' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.DISPATCH_TOKEN }}

      - name: Get CI configs
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: .ci

      - name: Copy semantic-release config
        run: cp .ci/.github/.releaserc.json .releaserc.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_TOKEN }}
        run: npx --yes semantic-release