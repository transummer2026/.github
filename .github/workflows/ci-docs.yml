name: CI Docs (Réutilisables)

# Optimisation minutes Actions : un seul job — chaque job démarré facture
# 1 minute minimum (arrondi GitHub). Les checks tournent en continue-on-error
# et le bilan final fait office de gate, comme dans ci-service.yml.

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      OTEL_ENDPOINT:
        required: true
      TAILSCALE_AUTHKEY:
        required: true
      DISCORD_WEBHOOK_REPO:
        required: true
      DISPATCH_TOKEN:
        required: true
      RELEASE_PLEASE_TOKEN:
        required: true

concurrency:
  group: ${{ github.repository }}-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Lint · Nommage · Publication · Observabilité
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get CI scripts
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          path: .ci

      - name: Record start time
        id: timer_start
        run: echo "start=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Commit lint
        id: commitlint
        continue-on-error: true
        uses: wagoid/commitlint-github-action@v6

      - name: Secret scanning
        id: secret_scan
        continue-on-error: true
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Markdown lint
        id: mdlint
        continue-on-error: true
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !Archives/**
            !.github/**
            !.ci/**
            !Pv/**
            !Todo/**
            !Template/**
            !Diagrams_uml/**
            !CHANGELOG.md

      - name: Vérification des liens Markdown
        id: links
        continue-on-error: true
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress --max-retries 3 --retry-wait-time 5 --exclude-path .ci './**/*.md'
          fail: true

      - name: Vérifier tous les nommages
        id: naming
        continue-on-error: true
        run: bash .ci/.github/scripts/check_docs_naming.sh

      # Comme avant : la publication ne part que si les checks de contenu
      # sont verts (le nommage, lui, ne bloquait déjà pas la release).
      - name: Versioning & publication
        id: release
        continue-on-error: true
        if: >-
          steps.commitlint.outcome == 'success' &&
          steps.secret_scan.outcome == 'success' &&
          steps.mdlint.outcome == 'success' &&
          steps.links.outcome == 'success'
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Compute duration
        id: timer
        if: always()
        run: |
          END=$(date +%s%3N)
          echo "ms=$(( END - ${{ steps.timer_start.outputs.start }} ))" >> "$GITHUB_OUTPUT"

      - name: Déterminer statut
        id: status
        env:
          OUTCOMES: |
            commitlint=${{ steps.commitlint.outcome }}
            secret-scan=${{ steps.secret_scan.outcome }}
            markdown-lint=${{ steps.mdlint.outcome }}
            liens-markdown=${{ steps.links.outcome }}
            nommage=${{ steps.naming.outcome }}
            release-please=${{ steps.release.outcome }}
        run: |
          if grep -q '=failure' <<< "$OUTCOMES"; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "status_code=2" >> "$GITHUB_OUTPUT"
          else
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "status_code=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Attendre connexion Tailscale et ping
        run: |
          timeout 30 bash -c 'until tailscale status --peers=false | grep -q "100\."; do sleep 1; done'
          echo "Tailscale connecté — IP: $(tailscale ip -4)"
          echo "Ping VPS..."
          ping -c 3 100.65.25.93 || echo "Ping échoué"

      - name: Envoyer trace OTel
        run: |
          TRACE_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 32)
          SPAN_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 16)
          END_NS=$(date +%s%N)
          DURATION_MS=${{ steps.timer.outputs.ms || '0' }}
          START_NS=$(( END_NS - DURATION_MS * 1000000 ))

          curl -f -X POST "${{ secrets.OTEL_ENDPOINT }}/v1/traces" \
            -H "Content-Type: application/json" \
            -d "{
              \"resourceSpans\": [{
                \"resource\": {
                  \"attributes\": [
                    {\"key\": \"service.name\", \"value\": {\"stringValue\": \"docs\"}},
                    {\"key\": \"deployment.environment\", \"value\": {\"stringValue\": \"ci\"}},
                    {\"key\": \"ci.provider\", \"value\": {\"stringValue\": \"github-actions\"}},
                    {\"key\": \"ci.repo\", \"value\": {\"stringValue\": \"${{ github.repository }}\"}},
                    {\"key\": \"ci.branch\", \"value\": {\"stringValue\": \"${{ github.ref_name }}\"}}
                  ]
                },
                \"scopeSpans\": [{
                  \"spans\": [{
                    \"traceId\": \"${TRACE_ID}\",
                    \"spanId\": \"${SPAN_ID}\",
                    \"name\": \"ci/docs\",
                    \"startTimeUnixNano\": \"${START_NS}\",
                    \"endTimeUnixNano\": \"${END_NS}\",
                    \"status\": {\"code\": ${{ steps.status.outputs.status_code }}},
                    \"attributes\": [
                      {\"key\": \"ci.run_id\", \"value\": {\"stringValue\": \"${{ github.run_id }}\"}},
                      {\"key\": \"ci.actor\", \"value\": {\"stringValue\": \"${{ github.actor }}\"}},
                      {\"key\": \"ci.status\", \"value\": {\"stringValue\": \"${{ steps.status.outputs.result }}\"}},
                      {\"key\": \"ci.duration_ms\", \"value\": {\"intValue\": ${DURATION_MS}}}
                    ]
                  }]
                }]
              }]
            }"

      - name: Notify Discord - succès
        if: steps.status.outputs.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: success
          title: "✅ Docs build réussi"

      - name: Notify Discord - échec
        if: steps.status.outputs.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: failure
          title: "❌ Docs build échoué - @${{ github.actor }}"
          color: 0xFF0000

      - name: Dispatch retour vers pipeline global
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/.github
          event-type: build-result
          client-payload: |
            {
              "service": "docs",
              "status": "${{ steps.status.outputs.result }}",
              "sha": "${{ github.sha }}",
              "run_id": "${{ github.run_id }}"
            }

      - name: Bilan des checks (gate)
        env:
          OUTCOMES: |
            commitlint=${{ steps.commitlint.outcome }}
            secret-scan=${{ steps.secret_scan.outcome }}
            markdown-lint=${{ steps.mdlint.outcome }}
            liens-markdown=${{ steps.links.outcome }}
            nommage=${{ steps.naming.outcome }}
            release-please=${{ steps.release.outcome }}
        run: bash .ci/.github/scripts/check_step_outcomes.sh
