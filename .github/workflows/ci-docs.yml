name: CI Docs (Réutilisables)

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      OTEL_ENDPOINT:
        required: true
      TAILSCALE_AUTHKEY:
        required: true
      DISCORD_WEBHOOK_REPO:
        required: true
      DISPATCH_TOKEN:
        required: true

concurrency:
  group: ${{ github.repository }}-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Lint · Checks · Publication
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      duration_ms: ${{ steps.timer.outputs.ms }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record start time
        id: timer_start
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Commit lint
        uses: wagoid/commitlint-github-action@v6

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !Archives/**
            !.github/**
            !Pv/**
            !Todo/**
            !Template/**
            !Diagrams_uml/**

      - name: Vérification des liens Markdown
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress './**/*.md'
          fail: true

      # - name: Génération auto PV et TODO
      #   run: |
      #     echo "# PV Auto-généré - $(date +%Y-%m-%d)" > _PV.md
      #     find . -name "PV-*.md" ! -path './.git*' | sort >> _PV.md || true
      #     echo "# TODO Auto-généré - $(date +%Y-%m-%d)" > _TODO.md
      #     grep -rn "TODO" --include="*.md" . ! -path './.git*' >> _TODO.md || true

      - name: Versioning & publication
        uses: google-github-actions/release-please-action@v4
        with:
          release-type: simple
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute duration
        id: timer
        if: always()
        run: |
          END=$(date +%s%3N)
          echo "ms=$(( END - ${{ steps.timer_start.outputs.start }} ))" >> $GITHUB_OUTPUT

  naming:
    name: Nommage · Dossiers · Fichiers · Templates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier tous les nommages
        run: |
          mapfile -t IGNORED_FOLDERS  < <(jq -r '.ignored_folders[]'       .ci_config.json 2>/dev/null)
          mapfile -t IGNORED_FILES    < <(jq -r '.ignored_files[]'         .ci_config.json 2>/dev/null)
          mapfile -t IGNORED_TEMPLATES< <(jq -r '.ignored_Templates_files[]' .ci_config.json 2>/dev/null)
          errors=()

          is_ignored_path() {
            local path="$1"; shift
            for pattern in "$@"; do
              [[ "$path" == *"/$pattern"* || "$path" == *"/$pattern" ]] && return 0
            done
            return 1
          }

          is_ignored_base() {
            local base="$1"; shift
            for pattern in "$@"; do
              [[ "$base" == "$pattern" ]] && return 0
            done
            return 1
          }

          check_train_case() {
            local name="$1"
            [[ "$name" =~ ^[A-Z][a-zA-Z0-9]*(-[a-zA-Z0-9]+)*$ ]]
          }

          # --- Passe unique sur tout l'arbre ---
          while read -r entry; do
            if [ -d "$entry" ]; then
              is_ignored_path "$entry" "${IGNORED_FOLDERS[@]}" && continue
              name=$(basename "$entry")
              if ! [[ "$name" =~ ^[A-Z][a-z0-9]*(_[a-z0-9]+)*$ ]]; then
                errors+=("❌ Dossier mal nommé : $entry (attendu Snake_case)")
              fi

            else
              base=$(basename "$entry")

              # Fichiers Template : check préfixe TPL
              if [[ "$entry" == ./Template/* ]]; then
                is_ignored_base "$base" "${IGNORED_TEMPLATES[@]}" && continue
                if ! [[ "$base" =~ ^TPL[-_] ]]; then
                  errors+=("❌ Fichier sans préfixe TPL dans Template : $entry")
                fi
                continue
              fi

              # Autres fichiers : check Train-Case
              is_ignored_base "$base" "${IGNORED_FILES[@]}" && continue
              if [[ "$base" == *.md ]]; then
                name="${base#_}"; name="${name%.md}"   # _ prefix autorisé
              else
                name="${base%.*}"
              fi
              if ! check_train_case "$name"; then
                errors+=("❌ Fichier mal nommé : $entry (attendu Train-Case)")
              fi
            fi
          done < <(find . -mindepth 1 -maxdepth 3 ! -path './.git*' \( -type f -o -type d \))

          # --- Rapport final ---
          if [ ${#errors[@]} -gt 0 ]; then
            echo ""
            echo "=== Erreurs de nommage ==="
            for err in "${errors[@]}"; do echo "$err"; done
            echo ""
            echo "Total : ${#errors[@]} erreur(s)"
            exit 1
          else
            echo "✅ Tous les nommages sont corrects"
          fi

  observe:
    name: OTel · Discord · Dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [docs, naming]
    if: always()
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      - name: Attendre connexion Tailscale et ping
        run: |
          timeout 30 bash -c 'until tailscale status --peers=false | grep -q "100\."; do sleep 1; done'
          echo "Tailscale connecté — IP: $(tailscale ip -4)"
          echo "Ping VPS..."
          ping -c 3 100.65.25.93 || echo "Ping échoué"


      - name: Déterminer statut
        id: status
        run: |
          if [[ "${{ needs.docs.result }}" == "success" && "${{ needs.naming.result }}" == "success" ]]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "status_code=1" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "status_code=2" >> $GITHUB_OUTPUT
          fi

      - name: Envoyer trace OTel
        run: |
          TRACE_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 32)
          SPAN_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 16)
          END_NS=$(date +%s%N)
          DURATION_MS=${{ needs.docs.outputs.duration_ms || '0' }}
          START_NS=$(( END_NS - DURATION_MS * 1000000 ))

          curl -f -X POST "${{ secrets.OTEL_ENDPOINT }}/v1/traces" \
            -H "Content-Type: application/json" \
            -d "{
              \"resourceSpans\": [{
                \"resource\": {
                  \"attributes\": [
                    {\"key\": \"service.name\", \"value\": {\"stringValue\": \"docs\"}},
                    {\"key\": \"deployment.environment\", \"value\": {\"stringValue\": \"ci\"}},
                    {\"key\": \"ci.provider\", \"value\": {\"stringValue\": \"github-actions\"}},
                    {\"key\": \"ci.repo\", \"value\": {\"stringValue\": \"${{ github.repository }}\"}},
                    {\"key\": \"ci.branch\", \"value\": {\"stringValue\": \"${{ github.ref_name }}\"}}
                  ]
                },
                \"scopeSpans\": [{
                  \"spans\": [{
                    \"traceId\": \"${TRACE_ID}\",
                    \"spanId\": \"${SPAN_ID}\",
                    \"name\": \"ci/docs\",
                    \"startTimeUnixNano\": \"${START_NS}\",
                    \"endTimeUnixNano\": \"${END_NS}\",
                    \"status\": {\"code\": ${{ steps.status.outputs.status_code }}},
                    \"attributes\": [
                      {\"key\": \"ci.run_id\", \"value\": {\"stringValue\": \"${{ github.run_id }}\"}},
                      {\"key\": \"ci.actor\", \"value\": {\"stringValue\": \"${{ github.actor }}\"}},
                      {\"key\": \"ci.status\", \"value\": {\"stringValue\": \"${{ steps.status.outputs.result }}\"}},
                      {\"key\": \"ci.duration_ms\", \"value\": {\"intValue\": ${DURATION_MS}}}
                    ]
                  }]
                }]
              }]
            }"

      - name: Notify Discord - succès
        if: steps.status.outputs.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: success
          title: "✅ Docs build réussi"

      - name: Notify Discord - échec
        if: steps.status.outputs.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: failure
          title: "❌ Docs build échoué - @${{ github.actor }}"
          color: 0xFF0000

      - name: Dispatch retour vers pipeline global
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/.github
          event-type: build-result
          client-payload: |
            {
              "service": "docs",
              "status": "${{ steps.status.outputs.result }}",
              "sha": "${{ github.sha }}",
              "run_id": "${{ github.run_id }}"
            }