name: CI Docs (Réutilisables)

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      OTEL_ENDPOINT:
        required: true
      TAILSCALE_AUTHKEY:
        required: true
      DISCORD_WEBHOOK_REPO:
        required: true
      DISPATCH_TOKEN:
        required: true

concurrency:
  group: ${{ github.repository }}-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Lint · Checks · Publication
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      duration_ms: ${{ steps.timer.outputs.ms }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record start time
        id: timer_start
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Commit lint
        uses: wagoid/commitlint-github-action@v6

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !Archives/**
            !.github/**
            !Pv/**
            !Todo/**
            !Template/**
            !Diagrams_uml/**

      - name: Vérifier nommage dossiers (snake_case)
        run: |
          IGNORED=$(jq -r '.ignored_folders[]' .ci_config.json 2>/dev/null)
          error=false

          while read dir; do
            name=$(basename "$dir")
            ignored=false
            for pattern in $IGNORED; do
              if echo "$dir" | grep -q "/$pattern"; then
                ignored=true
                break
              fi
            done
            [ "$ignored" = true ] && continue

            if ! echo "$name" | grep -qE '^[A-Z][a-z0-9]*(_[a-z0-9]+)*$'; then
              echo "❌ Dossier mal nommé : $dir (attendu Snake_case)"
              error=true
            fi
          done < <(find . -mindepth 1 -maxdepth 3 -type d)

          [ "$error" = true ] && exit 1

      - name: Vérifier nommage fichiers Markdown (Train-Case)
        run: |
          IGNORED=$(jq -r '.ignored_files[]' .ci_config.json 2>/dev/null)
          error=false
                  
          while read file; do
            name=$(basename "$file" .md)
            ignored=false
            for pattern in $IGNORED; do
              if [ "$name" = "$pattern" ]; then
                ignored=true
                break
              fi
            done
            [ "$ignored" = true ] && continue
                  
            if ! echo "$name" | grep -qE '^[A-Z][a-zA-Z0-9]*(-[a-zA-Z0-9]+)*$'; then
              echo "❌ Fichier Markdown mal nommé : $file (attendu Train-Case ou Start-Case)"
              error=true
            fi
          done < <(find . -name "*.md" ! -path './.git*')
                  
          [ "$error" = true ] && exit 1



      - name: Vérifier préfixes dans dossier Template
        run: |
          if [ -d "./Template" ]; then
            IGNORED=$(jq -r '.ignored_files[]' .ci_config.json 2>/dev/null)
            error=false
                  
            while read file; do
              name=$(basename "$file")
              ignored=false
              for pattern in $IGNORED; do
                if [ "$name" = "$pattern" ]; then
                  ignored=true
                  break
                fi
              done
              [ "$ignored" = true ] && continue
                  
              if ! echo "$name" | grep -qE '^TPL[-_]'; then
                echo "❌ Fichier sans préfixe TPL dans Template : $file"
                error=true
              fi
            done < <(find ./Template -type f)
                  
            [ "$error" = true ] && exit 1
          fi

      - name: Vérification des liens Markdown
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress './**/*.md'
          fail: true

      # - name: Génération auto PV et TODO
      #   run: |
      #     echo "# PV Auto-généré - $(date +%Y-%m-%d)" > _PV.md
      #     find . -name "PV-*.md" ! -path './.git*' | sort >> _PV.md || true
      #     echo "# TODO Auto-généré - $(date +%Y-%m-%d)" > _TODO.md
      #     grep -rn "TODO" --include="*.md" . ! -path './.git*' >> _TODO.md || true

      - name: Versioning & publication
        uses: google-github-actions/release-please-action@v4
        with:
          release-type: simple
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute duration
        id: timer
        if: always()
        run: |
          END=$(date +%s%3N)
          echo "ms=$(( END - ${{ steps.timer_start.outputs.start }} ))" >> $GITHUB_OUTPUT

  observe:
    name: OTel · Discord · Dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: docs
    if: always()
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      - name: Attendre connexion Tailscale et ping
        run: |
          timeout 30 bash -c 'until tailscale status --peers=false | grep -q "100\."; do sleep 1; done'
          echo "Tailscale connecté — IP: $(tailscale ip -4)"
          echo "Ping VPS..."
          ping -c 3 100.65.25.93 || echo "Ping échoué"


      - name: Déterminer statut
        id: status
        run: |
          if [[ "${{ needs.docs.result }}" == "success" ]]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "status_code=1" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "status_code=2" >> $GITHUB_OUTPUT
          fi

      - name: Envoyer trace OTel
        run: |
          TRACE_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 32)
          SPAN_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 16)
          END_NS=$(date +%s%N)
          DURATION_MS=${{ needs.docs.outputs.duration_ms || '0' }}
          START_NS=$(( END_NS - DURATION_MS * 1000000 ))

          curl -f -X POST "${{ secrets.OTEL_ENDPOINT }}/v1/traces" \
            -H "Content-Type: application/json" \
            -d "{
              \"resourceSpans\": [{
                \"resource\": {
                  \"attributes\": [
                    {\"key\": \"service.name\", \"value\": {\"stringValue\": \"docs\"}},
                    {\"key\": \"deployment.environment\", \"value\": {\"stringValue\": \"ci\"}},
                    {\"key\": \"ci.provider\", \"value\": {\"stringValue\": \"github-actions\"}},
                    {\"key\": \"ci.repo\", \"value\": {\"stringValue\": \"${{ github.repository }}\"}},
                    {\"key\": \"ci.branch\", \"value\": {\"stringValue\": \"${{ github.ref_name }}\"}}
                  ]
                },
                \"scopeSpans\": [{
                  \"spans\": [{
                    \"traceId\": \"${TRACE_ID}\",
                    \"spanId\": \"${SPAN_ID}\",
                    \"name\": \"ci/docs\",
                    \"startTimeUnixNano\": \"${START_NS}\",
                    \"endTimeUnixNano\": \"${END_NS}\",
                    \"status\": {\"code\": ${{ steps.status.outputs.status_code }}},
                    \"attributes\": [
                      {\"key\": \"ci.run_id\", \"value\": {\"stringValue\": \"${{ github.run_id }}\"}},
                      {\"key\": \"ci.actor\", \"value\": {\"stringValue\": \"${{ github.actor }}\"}},
                      {\"key\": \"ci.status\", \"value\": {\"stringValue\": \"${{ steps.status.outputs.result }}\"}},
                      {\"key\": \"ci.duration_ms\", \"value\": {\"intValue\": ${DURATION_MS}}}
                    ]
                  }]
                }]
              }]
            }"

      - name: Notify Discord - succès
        if: steps.status.outputs.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: success
          title: "✅ Docs build réussi"

      - name: Notify Discord - échec
        if: steps.status.outputs.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: failure
          title: "❌ Docs build échoué - @${{ github.actor }}"
          color: 0xFF0000

      - name: Dispatch retour vers pipeline global
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/.github
          event-type: build-result
          client-payload: |
            {
              "service": "docs",
              "status": "${{ steps.status.outputs.result }}",
              "sha": "${{ github.sha }}",
              "run_id": "${{ github.run_id }}"
            }