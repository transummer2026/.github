name: Mirror Docker Hub → GHCR

on:
  schedule:
    - cron: "0 6 1 * *" # 1er de chaque mois à 6h UTC
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Mirror images (multi-arch)
        run: .github/scripts/mirror-images.sh

