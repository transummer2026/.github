name: Update Submodules (Réutilisable)

on:
  workflow_call:
    secrets:
      APP_CLIENT_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      DISCORD_WEBHOOK_GLOBAL:
        required: true

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:

      - name: Tracer la source du déclenchement
        env:
          P_SERVICE: ${{ github.event.client_payload.service }}
          P_REPO: ${{ github.event.client_payload.repository }}
          P_BRANCH: ${{ github.event.client_payload.branch }}
          P_SHA: ${{ github.event.client_payload.sha }}
          P_ACTOR: ${{ github.event.client_payload.actor }}
          P_COMMIT_MSG: ${{ github.event.client_payload.commit_message }}
          P_COMMIT_URL: ${{ github.event.client_payload.commit_url }}
          P_CI_RUN_URL: ${{ github.event.client_payload.ci_run_url }}
          P_PR_NUMBER: ${{ github.event.client_payload.pr.number }}
          P_PR_TITLE: ${{ github.event.client_payload.pr.title }}
          P_PR_URL: ${{ github.event.client_payload.pr.url }}
        run: |
          {
            echo "## Déclenché par \`${GITHUB_EVENT_NAME}\`"
            echo ""
            echo "| Champ | Valeur |"
            echo "| --- | --- |"
            echo "| Service | ${P_SERVICE:-—} |"
            echo "| Dépôt | ${P_REPO:-—} |"
            echo "| Branche | ${P_BRANCH:-—} |"
            echo "| Commit | [${P_SHA:0:8}](${P_COMMIT_URL:-#}) |"
            echo "| Message | ${P_COMMIT_MSG:-—} |"
            echo "| Auteur | ${P_ACTOR:-—} |"
            echo "| PR | [#${P_PR_NUMBER:-—} ${P_PR_TITLE:-}](${P_PR_URL:-#}) |"
            echo "| Run CI source | ${P_CI_RUN_URL:-—} |"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      # https://medium.com/@rezaur.official/integrating-git-submodules-in-ci-c-the-real-world-guide-no-one-writes-497c7287af9f
      - name: Checkout repo (superprojet seul)
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: true
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configurer l'auth des sous-modules (SSH -> HTTPS + token)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --remote

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Guard
        id: guard
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes in submodules."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Submodules updated. Committing changes."

      - name: commit and push changes
        if: steps.guard.outputs.changed == 'true'
        run: |
          git add .
          git commit -m "feat: Update submodules"
          git push origin dev

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Configurer semantic-release
        run: |
          cat > .releaserc.json <<'EOF'
          {
            "branches": ["main", { "name": "dev", "prerelease": "rc" }],
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              ["@semantic-release/github", {
                "successComment": false,
                "failComment": false,
                "labels": false,
                "releasedLabels": false
              }]
            ]
          }
          EOF

      - name: Tag courant (avant release)
        id: before
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"

      - name: Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx --yes semantic-release

      - name: Détecter nouvelle release
        id: after
        run: |
          git fetch --tags --quiet
          new=$(git describe --tags --abbrev=0 2>/dev/null || echo none)
          echo "tag=$new" >> "$GITHUB_OUTPUT"
          if [ "$new" != "${{ steps.before.outputs.tag }}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord - nouvelle release (@everyone)
        if: steps.after.outputs.released == 'true'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GLOBAL }}
          content: "@everyone"
          status: success
          title: "Nouvelle release Pollpear - ${{ steps.after.outputs.tag }}"
          description: "Les sous-modules ont été synchronisés et la stack taggée en `${{ steps.after.outputs.tag }}`."
          color: 0x2ECC71

      - name: Notify Discord - échec sync (sans ping)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GLOBAL }}
          status: failure
          title: "❌ Échec - Update Git Submodules (Pollpear)"
          description: "La sync des sous-modules a échoué. Voir les logs du run."
          color: 0xFF0000
