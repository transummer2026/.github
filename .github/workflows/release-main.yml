name: Release Main (Réutilisable)

on:
  workflow_call:
    secrets:
      RELEASE_PLEASE_TOKEN:
        required: true
      DISPATCH_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Promotion manuelle staging -> main : les pointeurs submodules sont DÉJÀ figés.
      # On ne fait donc PAS de `submodule update --remote` ici (contrairement à dev).
      - name: Release Please (stable)
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # --- Archive all-in-one : uniquement quand une release est réellement créée ---
      # (= au merge de la Release-PR, qui sert de gate humain de prod)
      - name: Checkout recursive (récupère le code des submodules)
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 1
          token: ${{ secrets.DISPATCH_TOKEN }}

      - name: Build archive all-in-one
        if: steps.release.outputs.release_created == 'true'
        run: |
          tar czf "pollpear-${{ steps.release.outputs.tag_name }}.tar.gz" \
            --exclude-vcs \
            --exclude='./pollpear-*.tar.gz' \
            .

      - name: Upload archive to release
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            "pollpear-${{ steps.release.outputs.tag_name }}.tar.gz" \
            --repo "${{ github.repository }}"
