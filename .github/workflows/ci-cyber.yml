name: CI Cyber (Réutilisable)

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      OTEL_ENDPOINT:
        required: true
      TAILSCALE_AUTHKEY:
        required: true
      DISCORD_WEBHOOK_REPO:
        required: true
      GHCR_TOKEN:
        required: true
      DISPATCH_TOKEN:
        required: true
      SEMANTIC_TOKEN:
        required: true

concurrency:
  group: ${{ github.repository }}-cyber-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Commit lint · Secret scan · Dockerfile lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Commit lint
        uses: wagoid/commitlint-github-action@v6
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  build:
    name: Build · Scan Trivy · Push GHCR
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: read
      packages: write
    outputs:
      duration_ms: ${{ steps.timer.outputs.ms }}
    steps:
      - uses: actions/checkout@v7

      - name: Record start time
        id: timer_start
        run: echo "start=$(date +%s%3N)" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/cyber
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build image (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan vulnérabilités (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cyber:sha-${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Compute duration
        id: timer
        if: always()
        run: |
          END=$(date +%s%3N)
          echo "ms=$(( END - ${{ steps.timer_start.outputs.start }} ))" >> $GITHUB_OUTPUT

  observe:
    name: OTel · Discord · Dispatch
    runs-on: ubuntu-latest
    needs: [checks, build]
    if: always()
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Get CI scripts
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: .ci

      - name: Déterminer statut global
        id: status
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          QUALITY_RESULT: ${{ needs.checks.result }}
        run: bash .ci/.github/scripts/global_status.sh

      - name: Envoyer trace OTel
        env:
          OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
          SERVICE: cyber
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          DURATION_MS: ${{ needs.build.outputs.duration_ms || '0' }}
          STATUS_CODE: ${{ steps.status.outputs.status_code }}
          STATUS_RESULT: ${{ steps.status.outputs.result }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          TEST_COUNT: "0"
          COVERAGE: "0"
        run: bash .ci/.github/scripts/send_otel_trace.sh

      - name: Notify Discord - succès
        if: steps.status.outputs.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: success
          title: "✅ Build réussi - cyber"
          description: "Image Vault poussée - sha-${{ github.sha }}"

      - name: Notify Discord - échec
        if: steps.status.outputs.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_REPO }}
          status: failure
          title: "❌ Build échoué - cyber"
          description: "@${{ github.actor }} - voir les logs"
          color: 0xFF0000

      - name: Dispatch retour vers pipeline global
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/.github
          event-type: build-result
          client-payload: |
            {
              "service": "cyber",
              "status": "${{ steps.status.outputs.result }}",
              "sha": "${{ github.sha }}",
              "run_id": "${{ github.run_id }}",
              "image": "ghcr.io/${{ github.repository_owner }}/cyber:sha-${{ github.sha }}"
            }

      - name: Résoudre la PR source
        id: src_pr
        if: steps.status.outputs.result == 'success' && github.ref_name == 'dev'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: bash .ci/.github/scripts/resolve_pr.sh

      - name: Notifier Pollpear (update submodule)
        if: steps.status.outputs.result == 'success' && github.ref_name == 'dev'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/Pollpear
          event-type: submodule-update
          client-payload: |
            {
              "service": "cyber",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "commit_message": ${{ toJSON(github.event.head_commit.message) }},
              "commit_url": "${{ github.event.head_commit.url }}",
              "ci_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "pr_number": "${{ steps.src_pr.outputs.number }}",
              "pr_title": ${{ toJSON(steps.src_pr.outputs.title) }},
              "pr_url": "${{ steps.src_pr.outputs.url }}"
            }

  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ (github.ref_name == 'dev' || github.ref_name == 'main') && needs.build.result == 'success' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.DISPATCH_TOKEN }}

      - name: Get CI configs
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: .ci

      - name: Copy semantic-release config
        run: cp .ci/.github/.releaserc.json .releaserc.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_TOKEN }}
        run: npx --yes semantic-release

  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    needs: [checks, build]
    if: always()
    steps:
      - name: Bloquer si un job requis a échoué
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
