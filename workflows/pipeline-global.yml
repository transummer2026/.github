name: Pipeline Global

on:
  push:
    branches: [dev]
  repository_dispatch:
    types: [build-result, all-builds-success]

jobs:
  # déclanché par : push sur dev
  # Dispatch vers tous les repos (gateway, ai, front, infra, api, cyber, docs)
  dispatch:
    name: Dispatch vers tous les repos
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Trigger gateway
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/gateway
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger ai
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/ai
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger front
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/front
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/infra
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger api
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/api
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger cyber
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/cyber
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

      - name: Trigger docs
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/docs
          event-type: ci-trigger
          client-payload: '{"sha": "${{ github.sha }}", "actor": "${{ github.actor }}"}'

  # déclanché par : build-result de chaque repo
  # Collecte les résultats de tous les builds, vérifie si tous sont reçus et
  # si tous sont OK → trigger intégration, sinon notifie échec global
  collect:
    name: Collecter résultats builds
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch' && github.event.action == 'build-result'
    steps:
      - name: Restaurer cache résultats
        uses: actions/cache@v4
        with:
          path: build-results
          key: build-results-${{ github.event.client_payload.sha }}
          restore-keys: build-results-${{ github.event.client_payload.sha }}

      - name: Écrire résultat du service
        run: |
          mkdir -p build-results
          echo '${{ toJson(github.event.client_payload) }}' \
            > build-results/${{ github.event.client_payload.service }}.json

      - name: Vérifier si tous les builds sont reçus
        id: check
        run: |
          SERVICES=(gateway ai front infra api cyber docs)
          ALL_DONE=true
          ALL_SUCCESS=true

          for svc in "${SERVICES[@]}"; do
            if [ ! -f "build-results/${svc}.json" ]; then
              echo "⏳ En attente : ${svc}"
              ALL_DONE=false
            else
              STATUS=$(jq -r '.status' "build-results/${svc}.json")
              if [ "$STATUS" != "success" ]; then
                ALL_SUCCESS=false
                echo "❌ Échec : ${svc}"
              else
                echo "✅ OK : ${svc}"
              fi
            fi
          done

          echo "all_done=${ALL_DONE}" >> $GITHUB_OUTPUT
          echo "all_success=${ALL_SUCCESS}" >> $GITHUB_OUTPUT

      - name: Trigger intégration - tous OK
        if: steps.check.outputs.all_done == 'true' && steps.check.outputs.all_success == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/.github
          event-type: all-builds-success
          client-payload: '{"sha": "${{ github.event.client_payload.sha }}"}'

      - name: Notify Discord - pipeline bloqué
        if: steps.check.outputs.all_done == 'true' && steps.check.outputs.all_success == 'false'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GLOBAL }}
          status: failure
          title: "🚫 Pipeline bloqué - au moins un build a échoué"
          description: "Voir les notifications par repo."
          color: 0xFF0000

  # déclanché par : all-builds-success
  integration:
    name: Tests intégration · Release · SBOM
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch' && github.event.action == 'all-builds-success'
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull images :sha
        run: |
          SHA=${{ github.event.client_payload.sha }}
          for svc in gateway ai front infra api cyber; do
            docker pull ghcr.io/${{ github.repository_owner }}/${svc}:sha-${SHA}
          done

      - name: Container scanning (Trivy)
        run: |
          SHA=${{ github.event.client_payload.sha }}
          for svc in gateway ai front infra api cyber; do
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy image \
              --exit-code 1 \
              --severity CRITICAL \
              ghcr.io/${{ github.repository_owner }}/${svc}:sha-${SHA}
          done

      - name: Tests d'intégration
        run: |
          echo "À adapter - ex: docker compose -f docker-compose.test.yml up --abort-on-container-exit"

      - name: Créer Release globale
        id: release
        uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          release-type: simple

      - name: Trigger sync submodules Pollpear
        if: steps.release.outputs.release_created
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/pollpear
          event-type: sync-submodules
          client-payload: |
            {
              "sha": "${{ github.event.client_payload.sha }}",
              "tag": "${{ steps.release.outputs.tag_name }}"
            }

      - name: Générer SBOM
        if: steps.release.outputs.release_created
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/gateway:sha-${{ github.event.client_payload.sha }}
          artifact-name: sbom.spdx.json

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Envoyer trace OTel pipeline global
        run: |
          TRACE_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 32)
          SPAN_ID=$(cat /proc/sys/kernel/random/uuid | tr -d '-' | head -c 16)
          END_NS=$(date +%s%N)

          curl -sf -X POST "${{ secrets.OTEL_ENDPOINT }}/v1/traces" \
            -H "Content-Type: application/json" \
            -d "{
              \"resourceSpans\": [{
                \"resource\": {
                  \"attributes\": [
                    {\"key\": \"service.name\", \"value\": {\"stringValue\": \"pipeline-global\"}},
                    {\"key\": \"deployment.environment\", \"value\": {\"stringValue\": \"ci\"}}
                  ]
                },
                \"scopeSpans\": [{
                  \"spans\": [{
                    \"traceId\": \"${TRACE_ID}\",
                    \"spanId\": \"${SPAN_ID}\",
                    \"name\": \"pipeline/integration\",
                    \"startTimeUnixNano\": \"${END_NS}\",
                    \"endTimeUnixNano\": \"${END_NS}\",
                    \"status\": {\"code\": 1},
                    \"attributes\": [
                      {\"key\": \"ci.sha\", \"value\": {\"stringValue\": \"${{ github.event.client_payload.sha }}\"}},
                      {\"key\": \"ci.tag\", \"value\": {\"stringValue\": \"${{ steps.release.outputs.tag_name || 'none' }}\"}}
                    ]
                  }]
                }]
              }]
            }"

      - name: Notify Discord - pipeline réussi
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GLOBAL }}
          status: success
          title: "🚀 Pipeline dev réussi - ${{ steps.release.outputs.tag_name || github.event.client_payload.sha }}"
          description: "Tous les services buildés, testés et releasés."